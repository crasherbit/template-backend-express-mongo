[tools]
node = "24"
pnpm = "latest"

[env]
_.file = ".env.develop"

[tasks.install]
description = "Install dependencies"
run = "pnpm install"

[tasks.dev]
description = "Start dev server with nodemon"
run = "NODE_ENV=dev pnpm exec nodemon ./src/index.js"
depends = ["docker-mongo:up", "install"]

[tasks.start]
description = "Start production server"
run = "node ./src/index.js"

[tasks.test]
description = "Run unit tests"
run = "NODE_ENV=test node --test 'src/**/*.unit.test.js'"

[tasks."test:integration"]
description = "Start test MongoDB, run integration tests, stop MongoDB"
run = """
docker compose up -d mongo
sleep 2
NODE_ENV=test MONGODB_CONNSTRING=mongodb://localhost:59593/template-backend-test node --test 'src/**/*.integration.test.js'
TEST_EXIT=$?
docker compose down mongo
exit $TEST_EXIT
"""

[tasks."test:all"]
description = "Run unit + integration tests"
depends = ["test", "test:integration"]

[tasks.lint]
description = "Check with Biome (lint + format)"
run = "pnpm exec biome check ."

[tasks."lint:fix"]
description = "Fix with Biome (lint + format)"
run = "pnpm exec biome check --write ."

[tasks.check]
description = "Run all checks (Biome + tests)"
depends = ["lint", "test"]

[tasks."docker:up"]
description = "Start infrastructure with Docker"
run = "docker compose up -d"

[tasks."docker:down"]
description = "Stop infrastructure with Docker"
run = "docker compose down"

[tasks."docker-mongo:up"]
description = "Start MongoDB with Docker"
run = "docker compose up -d mongo"

[tasks."docker-mongo:down"]
description = "Stop MongoDB"
run = "docker compose down mongo"

[tasks.setup]
description = "Full local setup: Docker + install"
depends = ["docker:up", "install"]
run = "echo 'Ready — run: mise run dev'"
