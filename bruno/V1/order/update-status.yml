info:
  name: Update Order Status
  type: http
  seq: 2

http:
  method: PATCH
  url: "{{BASE_URL}}/order/{{orderId}}/status"
  body:
    type: json
    data: |-
      {
        "status": "PAID"
      }
  auth: none

vars:
