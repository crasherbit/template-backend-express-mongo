info:
  name: Register Begin
  type: http
  seq: 1

http:
  method: POST
  url: "{{BASE_URL}}/auth/register/begin"
  body:
    type: json
    data: |-
      {
        "username": "alice"
      }

runtime:
  actions:
    - type: set-variable
      phase: after-response
      selector:
        expression: res.body.payload.sessionId
        method: jsonq
      variable:
        name: registerSessionId
        scope: runtime

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

