info:
  name: Register Begin
  type: http
  seq: 1

http:
  method: POST
  url: "{{BASE_URL}}/auth/register/begin"
  body:
    type: json
    data: |-
      {
        "username": "alice"
      }
  auth: none

assert:
  - name: res.status
    value: eq 200
  - name: res.body.payload.sessionId
    value: isDefined

script:
  post-response: |-
    if (res.body.payload && res.body.payload.sessionId) {
      bru.setVar("registerSessionId", res.body.payload.sessionId);
    }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
