info:
  name: Register Complete
  type: http
  seq: 2

http:
  method: POST
  url: "{{BASE_URL}}/auth/register/complete"
  body:
    type: json
    data: |-
      {
        "sessionId": "{{registerSessionId}}",
        "credential": {}
      }
  auth: none

assert:
  - name: res.status
    value: eq 200
  - name: res.body.payload.user.username
    value: isDefined
  - name: res.body.payload.recoveryCodes
    value: isDefined

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
