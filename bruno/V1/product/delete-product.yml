info:
  name: Delete Product
  type: http
  seq: 5

http:
  method: DELETE
  url: "{{BASE_URL}}/product/:id"
  params:
    - name: id
      value: "{{productId}}"
      type: path
  body:
    type: none
  auth: none

assert:
  - name: res.status
    value: eq 200
  - name: res.body.message
    value: eq OK

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
