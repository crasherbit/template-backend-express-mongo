info:
  name: Create Product
  type: http
  seq: 3

http:
  method: POST
  url: "{{BASE_URL}}/product"
  body:
    type: json
    data: |-
      {
        "name": "New Product",
        "price": 29.99,
        "category": "electronics",
        "description": "A test product"
      }
  auth: none

assert:
  - name: res.status
    value: eq 200
  - name: res.body.message
    value: eq OK
  - name: res.body.payload.name
    value: eq New Product

script:
  post-response: |-
    if (res.body.payload && res.body.payload._id) {
      bru.setVar("productId", res.body.payload._id);
    }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
