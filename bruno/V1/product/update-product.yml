info:
  name: Update Product
  type: http
  seq: 4

http:
  method: PUT
  url: "{{BASE_URL}}/product/:id"
  params:
    - name: id
      value: "{{productId}}"
      type: path
  body:
    type: json
    data: |-
      {
        "name": "Updated Product",
        "price": 39.99
      }
  auth: none

assert:
  - name: res.status
    value: eq 200
  - name: res.body.message
    value: eq OK
  - name: res.body.payload.name
    value: eq Updated Product

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
